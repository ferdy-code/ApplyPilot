services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    image: applypilot/frontend
    restart: unless-stopped
    ports:
      - '${DOCKER_FRONTEND_PORT}:3000'

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: applypilot/backend
    restart: unless-stopped
    user: '${DOCKER_UID:-1000}:${DOCKER_GID:-1000}'
    ports:
      - '${DOCKER_BACKEND_PORT}:3000'
    volumes:
      - ./services/backend/storage/app:/app/storage/app